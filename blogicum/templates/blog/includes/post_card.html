<article class="mb-5">
  <h2>{{ post.title }}</h2>

  <ul>
    <li>
      Место:
      {% if post.location %}
        {{ post.location.name }}
      {% else %}
        Планета Земля
      {% endif %}
    </li>
    <li>Дата: {{ post.pub_date|date:"d E Y" }}</li>
    <li>
      Категория:
      <a href="{% url 'blog:category_posts' post.category.slug %}">
        {{ post.category.title }}
      </a>
    </li>
  </ul>

  <p>{{ post.text|linebreaksbr }}</p>

  <a href="{% url 'blog:post_detail' post.pk %}">Читать полный текст</a>
</article>
